<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Admin &middot; Greaze Mike</title>
    <link rel="icon" type="image/jpeg" href="images/greasemike.jpg" />
    <meta name="robots" content="noindex, nofollow">

    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                fontFamily: { sans: ['Manrope', 'sans-serif'], serif: ['Playfair Display', 'serif'] },
                extend: {
                    colors: {
                        gold: { 100: '#A08050', 200: '#907040', 300: '#806030' },
                        noir: '#0F0C08', panel: '#1A1612',
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-noir text-slate-300 font-sans min-h-screen">

    <!-- LOGIN VIEW -->
    <section id="login-view" class="hidden min-h-screen flex items-center justify-center px-4">
        <form id="login-form" class="w-full max-w-sm border border-gold-300/30 bg-panel p-6 sm:p-8">
            <h1 class="text-2xl font-serif font-bold text-white mb-1">Admin Login</h1>
            <p class="text-slate-400 text-sm mb-6">Enter passcode to manage portfolio.</p>

            <label class="block text-xs uppercase tracking-widest text-gold-200 mb-1">Passcode</label>
            <input id="login-password" type="password" required autocomplete="current-password"
                class="w-full mb-4 bg-noir border border-gold-300/30 px-3 py-2 text-white focus:outline-none focus:border-gold-100">

            <p id="login-error" class="text-red-400 text-sm mb-3"></p>
            <button type="submit"
                class="w-full bg-gradient-to-br from-gold-100 to-gold-300 text-noir font-bold uppercase tracking-widest py-2 hover:opacity-90 transition-opacity">
                Log In
            </button>
        </form>
    </section>

    <!-- ADMIN VIEW -->
    <section id="admin-view" class="hidden max-w-3xl mx-auto px-4 py-10">
        <div class="flex flex-wrap items-center justify-between gap-3 mb-8">
            <h1 class="text-2xl sm:text-3xl font-serif font-bold text-white">Portfolio <span class="text-gold-100">Admin</span></h1>
            <div class="flex items-center gap-4">
                <a href="index.html" class="text-gold-100 hover:text-white text-sm uppercase tracking-wider">View Site</a>
                <button id="logout-btn" class="text-slate-400 hover:text-white text-sm uppercase tracking-wider">Logout</button>
            </div>
        </div>

        <!-- Form -->
        <form id="project-form" class="border border-gold-300/30 bg-panel p-5 sm:p-6 mb-10">
            <h2 id="form-title" class="text-xl font-serif font-bold text-white mb-5">Add Project</h2>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs uppercase tracking-widest text-gold-200 mb-1">Title *</label>
                    <input id="f-title" required class="w-full bg-noir border border-gold-300/30 px-3 py-2 text-white focus:outline-none focus:border-gold-100">
                </div>
                <div>
                    <label class="block text-xs uppercase tracking-widest text-gold-200 mb-1">Tag (e.g. Web Dev)</label>
                    <input id="f-tag" class="w-full bg-noir border border-gold-300/30 px-3 py-2 text-white focus:outline-none focus:border-gold-100">
                </div>
            </div>

            <label class="block text-xs uppercase tracking-widest text-gold-200 mb-1 mt-4">Description</label>
            <textarea id="f-description" rows="3" class="w-full bg-noir border border-gold-300/30 px-3 py-2 text-white focus:outline-none focus:border-gold-100"></textarea>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-4">
                <div>
                    <label class="block text-xs uppercase tracking-widest text-gold-200 mb-1">Site URL</label>
                    <input id="f-site_url" type="url" placeholder="https://" class="w-full bg-noir border border-gold-300/30 px-3 py-2 text-white focus:outline-none focus:border-gold-100">
                </div>
                <div>
                    <label class="block text-xs uppercase tracking-widest text-gold-200 mb-1">Twitter / X URL</label>
                    <input id="f-twitter_url" type="url" placeholder="https://" class="w-full bg-noir border border-gold-300/30 px-3 py-2 text-white focus:outline-none focus:border-gold-100">
                </div>
                <div>
                    <label class="block text-xs uppercase tracking-widest text-gold-200 mb-1">Discord URL</label>
                    <input id="f-discord_url" type="url" placeholder="https://" class="w-full bg-noir border border-gold-300/30 px-3 py-2 text-white focus:outline-none focus:border-gold-100">
                </div>
                <div>
                    <label class="block text-xs uppercase tracking-widest text-gold-200 mb-1">Telegram URL</label>
                    <input id="f-telegram_url" type="url" placeholder="https://" class="w-full bg-noir border border-gold-300/30 px-3 py-2 text-white focus:outline-none focus:border-gold-100">
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-4">
                <div>
                    <label class="block text-xs uppercase tracking-widest text-gold-200 mb-1">Image</label>
                    <input id="image-file" type="file" accept="image/*" class="w-full text-sm text-slate-400 file:mr-3 file:border-0 file:bg-gold-300 file:text-noir file:px-3 file:py-2 file:uppercase file:text-xs file:font-bold">
                    <p id="current-image" class="text-slate-500 text-xs mt-1"></p>
                </div>
                <div>
                    <label class="block text-xs uppercase tracking-widest text-gold-200 mb-1">Sort Order (low first)</label>
                    <input id="f-sort_order" type="number" value="0" class="w-full bg-noir border border-gold-300/30 px-3 py-2 text-white focus:outline-none focus:border-gold-100">
                </div>
            </div>

            <p id="form-error" class="text-red-400 text-sm mt-4"></p>

            <div class="flex items-center gap-3 mt-5">
                <button type="submit"
                    class="bg-gradient-to-br from-gold-100 to-gold-300 text-noir font-bold uppercase tracking-widest px-6 py-2 hover:opacity-90 transition-opacity">
                    Save Project
                </button>
                <button id="reset-btn" type="button"
                    class="text-slate-400 hover:text-white text-sm uppercase tracking-wider">Clear</button>
            </div>
        </form>

        <!-- List -->
        <h2 class="text-xl font-serif font-bold text-white mb-4">Existing Projects</h2>
        <div id="project-list" class="space-y-3"></div>

        <!-- ================= CASE STUDIES ================= -->
        <hr class="border-gold-300/20 my-12">

        <form id="cs-form" class="border border-gold-300/30 bg-panel p-5 sm:p-6 mb-10">
            <h2 id="cs-form-title" class="text-xl font-serif font-bold text-white mb-5">Add Case Study</h2>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs uppercase tracking-widest text-gold-200 mb-1">Title *</label>
                    <input id="cs-title" required class="w-full bg-noir border border-gold-300/30 px-3 py-2 text-white focus:outline-none focus:border-gold-100">
                </div>
                <div>
                    <label class="block text-xs uppercase tracking-widest text-gold-200 mb-1">Sort Order (low first)</label>
                    <input id="cs-sort_order" type="number" value="0" class="w-full bg-noir border border-gold-300/30 px-3 py-2 text-white focus:outline-none focus:border-gold-100">
                </div>
            </div>

            <label class="block text-xs uppercase tracking-widest text-gold-200 mb-1 mt-4">Description</label>
            <textarea id="cs-description" rows="3" class="w-full bg-noir border border-gold-300/30 px-3 py-2 text-white focus:outline-none focus:border-gold-100"></textarea>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-4">
                <div>
                    <label class="block text-xs uppercase tracking-widest text-gold-200 mb-1">My Role</label>
                    <input id="cs-role" class="w-full bg-noir border border-gold-300/30 px-3 py-2 text-white focus:outline-none focus:border-gold-100">
                </div>
                <div>
                    <label class="block text-xs uppercase tracking-widest text-gold-200 mb-1">Tech Stack</label>
                    <input id="cs-tech_stack" class="w-full bg-noir border border-gold-300/30 px-3 py-2 text-white focus:outline-none focus:border-gold-100">
                </div>
            </div>

            <label class="block text-xs uppercase tracking-widest text-gold-200 mb-1 mt-4">Key Features (one per line)</label>
            <textarea id="cs-features" rows="4" placeholder="One feature per line" class="w-full bg-noir border border-gold-300/30 px-3 py-2 text-white focus:outline-none focus:border-gold-100"></textarea>

            <label class="block text-xs uppercase tracking-widest text-gold-200 mb-1 mt-4">Challenge &amp; Solution</label>
            <textarea id="cs-challenge" rows="3" class="w-full bg-noir border border-gold-300/30 px-3 py-2 text-white focus:outline-none focus:border-gold-100"></textarea>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-4">
                <div>
                    <label class="block text-xs uppercase tracking-widest text-gold-200 mb-1">Live URL</label>
                    <input id="cs-live_url" type="url" placeholder="https://" class="w-full bg-noir border border-gold-300/30 px-3 py-2 text-white focus:outline-none focus:border-gold-100">
                </div>
                <div>
                    <label class="block text-xs uppercase tracking-widest text-gold-200 mb-1">Image</label>
                    <input id="cs-image-file" type="file" accept="image/*" class="w-full text-sm text-slate-400 file:mr-3 file:border-0 file:bg-gold-300 file:text-noir file:px-3 file:py-2 file:uppercase file:text-xs file:font-bold">
                    <p id="cs-current-image" class="text-slate-500 text-xs mt-1"></p>
                </div>
            </div>

            <p id="cs-form-error" class="text-red-400 text-sm mt-4"></p>

            <div class="flex items-center gap-3 mt-5">
                <button type="submit"
                    class="bg-gradient-to-br from-gold-100 to-gold-300 text-noir font-bold uppercase tracking-widest px-6 py-2 hover:opacity-90 transition-opacity">
                    Save Case Study
                </button>
                <button id="cs-reset-btn" type="button"
                    class="text-slate-400 hover:text-white text-sm uppercase tracking-wider">Clear</button>
            </div>
        </form>

        <h2 class="text-xl font-serif font-bold text-white mb-4">Existing Case Studies</h2>
        <div id="cs-list" class="space-y-3"></div>
    </section>

    <!-- Supabase + app scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/admin.js"></script>
</body>

</html>
